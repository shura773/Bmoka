<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyShop Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
    --forest:#FFFFFF;
    --paper:#F7F5F2;
    --paper-dark:#E6E3DD;
    --khaki:#6E6D74;
    --rust:#FF4433;
    --rust-dark:#E23A22;
    --ink:#15151A;
    --ink-soft:#6E6D74;
    --green-ok:#1F9254;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--paper);color:var(--ink);font-family:'Inter',sans-serif;}
h1,h2{font-family:'Space Grotesk',sans-serif;font-weight:700;}
.mono{font-family:'Inter',sans-serif;}

header{
    background:var(--forest);
    color:var(--ink);
    padding:20px 5%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border-bottom:2px solid var(--rust);
}
header h1{font-size:22px;color:var(--ink);}
header .sub{font-family:'Inter',sans-serif;font-weight:600;font-size:11px;color:var(--ink-soft);letter-spacing:.5px;text-transform:uppercase;}
#logoutBtn{
    background:none;border:1.5px solid var(--paper-dark);color:var(--ink);
    padding:8px 16px;cursor:pointer;font-family:'Inter',sans-serif;font-weight:600;font-size:12px;
    text-transform:uppercase;letter-spacing:.5px;border-radius:999px;
}
#logoutBtn:hover{border-color:var(--rust);color:var(--rust-dark);}

/* ---- login screen ---- */
#loginScreen{
    max-width:380px;
    margin:90px auto;
    padding:34px;
    background:var(--paper);
    border:1.5px solid var(--ink);
}
#loginScreen h2{margin-bottom:6px;font-size:22px;}
#loginScreen p.sub{color:var(--ink-soft);font-size:13px;margin-bottom:24px;}
.field{margin-bottom:16px;}
.field label{
    display:block;font-family:'Inter',sans-serif;font-size:11px;
    letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);margin-bottom:6px;
}
.field input{
    width:100%;padding:12px 14px;border:1.5px solid var(--ink);
    background:var(--paper);font-family:'Inter',sans-serif;font-size:14px;
}
.btn{
    display:inline-block;background:var(--rust);color:var(--paper);
    padding:13px 26px;border:none;cursor:pointer;font-family:'Inter',sans-serif;
    font-size:12px;letter-spacing:1px;text-transform:uppercase;
}
.btn:hover{background:var(--rust-dark);}
.btn.outline{background:transparent;border:1.5px solid var(--ink);color:var(--ink);}
.btn.outline:hover{background:var(--ink);color:var(--paper);}
.error-msg{color:var(--rust-dark);font-size:13px;margin-top:10px;display:none;}
.error-msg.show{display:block;}

/* ---- dashboard ---- */
#dashboard{display:none;padding:40px 5%;max-width:1200px;margin:0 auto;}
.section{margin-bottom:60px;}
.section-head{
    display:flex;justify-content:space-between;align-items:center;
    border-bottom:2px solid var(--ink);padding-bottom:14px;margin-bottom:24px;
}
.section-head h2{font-size:22px;}
table{width:100%;border-collapse:collapse;background:var(--paper);}
th,td{
    text-align:left;padding:10px 12px;border-bottom:1px solid var(--paper-dark);
    font-size:13px;vertical-align:top;
}
th{
    font-family:'Inter',sans-serif;font-size:11px;letter-spacing:.5px;
    text-transform:uppercase;color:var(--ink-soft);border-bottom:2px solid var(--ink);
}
tr:hover td{background:var(--paper-dark);}
.status-badge{
    font-family:'Inter',sans-serif;font-size:10px;letter-spacing:.5px;
    text-transform:uppercase;padding:4px 8px;border-radius:3px;display:inline-block;
}
.status-pending{background:#eee0c0;color:#7a5c00;}
.status-paid{background:#d9ecd9;color:var(--green-ok);}
.status-shipped{background:#d8e3ef;color:#274a75;}
.status-cancelled,.status-failed{background:#f3d9d5;color:var(--rust-dark);}
select, input.edit-input{
    font-family:'Inter',sans-serif;font-size:12px;padding:6px 8px;
    border:1.5px solid var(--ink);background:var(--paper);width:100%;max-width:110px;
}
.save-btn{
    font-family:'Inter',sans-serif;font-size:11px;padding:6px 10px;
    border:1.5px solid var(--ink);background:transparent;cursor:pointer;margin-left:6px;
}
.save-btn:hover{background:var(--ink);color:var(--paper);}
.export-row{display:flex;gap:12px;}
.empty-note{color:var(--ink-soft);font-size:13px;padding:20px 0;}
.items-cell{font-size:12px;color:var(--ink-soft);max-width:220px;}
</style>
</head>
<body>

<header>
<div>
<h1>MyShop Admin</h1>
<div class="sub">Order &amp; Product Management</div>
</div>
<button id="logoutBtn" onclick="adminLogout()" style="display:none;">Log Out</button>
</header>

<div id="loginScreen">
<h2>Admin Login</h2>
<p class="sub">Restricted — one account only.</p>
<form id="loginForm" onsubmit="adminLogin(event)">
<div class="field">
<label for="username">Username</label>
<input type="text" id="username" required autocomplete="username">
</div>
<div class="field">
<label for="password">Password</label>
<input type="password" id="password" required autocomplete="current-password">
</div>
<button type="submit" class="btn">Log In</button>
<div class="error-msg" id="loginError"></div>
</form>
</div>

<div id="dashboard">

<div class="section">
<div class="section-head">
<h2>Orders</h2>
<div class="export-row">
<a class="btn outline" href="/api/admin/export/orders.csv">Export Orders (CSV)</a>
</div>
</div>
<div id="ordersTableWrap"><p class="empty-note">Loading orders…</p></div>
</div>

<div class="section">
<div class="section-head">
<h2>Products</h2>
<div class="export-row">
<a class="btn outline" href="/api/admin/export/products.csv">Export Products (CSV)</a>
</div>
</div>
<div id="productsTableWrap"><p class="empty-note">Loading products…</p></div>
</div>

</div>

<script>
function adminLogin(e){
    e.preventDefault();
    var errEl = document.getElementById('loginError');
    errEl.classList.remove('show');

    fetch('/api/admin/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({
            username: document.getElementById('username').value,
            password: document.getElementById('password').value
        })
    })
    .then(function(res){
        if(!res.ok) return res.json().then(function(err){ throw new Error(err.error || 'Login failed'); });
        return res.json();
    })
    .then(function(){
        showDashboard();
    })
    .catch(function(err){
        errEl.textContent = err.message;
        errEl.classList.add('show');
    });
}

function adminLogout(){
    fetch('/api/admin/logout', { method:'POST' }).then(function(){
        location.reload();
    });
}

function showDashboard(){
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    document.getElementById('logoutBtn').style.display = 'inline-block';
    loadOrders();
    loadProducts();
}

function checkSession(){
    fetch('/api/admin/me')
        .then(function(res){ return res.json(); })
        .then(function(data){
            if(data.loggedIn){ showDashboard(); }
        });
}

function loadOrders(){
    fetch('/api/admin/orders')
        .then(function(res){ return res.json(); })
        .then(function(data){ renderOrders(data.orders || []); })
        .catch(function(){
            document.getElementById('ordersTableWrap').innerHTML = '<p class="empty-note">Could not load orders.</p>';
        });
}

function renderOrders(orders){
    var wrap = document.getElementById('ordersTableWrap');
    if(orders.length === 0){
        wrap.innerHTML = '<p class="empty-note">No orders yet.</p>';
        return;
    }
    var statuses = ['pending','paid','shipped','cancelled','failed'];
    var html = '<table><thead><tr>' +
        '<th>Order</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Placed</th><th></th>' +
        '</tr></thead><tbody>';

    orders.forEach(function(o){
        var itemsText = o.items.map(function(i){ return i.product_name+' x'+i.qty; }).join(', ');
        var optionsHtml = statuses.map(function(s){
            return '<option value="'+s+'"'+(s===o.status?' selected':'')+'>'+s+'</option>';
        }).join('');

        html += '<tr>' +
            '<td class="mono">'+o.tran_id+'</td>' +
            '<td>'+o.customer_name+'<br><span class="mono" style="font-size:11px;color:var(--ink-soft);">'+o.customer_email+'</span></td>' +
            '<td class="items-cell">'+itemsText+'</td>' +
            '<td class="mono">$'+o.total_usd+'</td>' +
            '<td>' +
                '<select id="status-'+o.id+'">'+optionsHtml+'</select>' +
            '</td>' +
            '<td class="mono" style="font-size:11px;">'+o.created_at+'</td>' +
            '<td><button class="save-btn" onclick="saveOrderStatus('+o.id+')">Save</button></td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
}

function saveOrderStatus(orderId){
    var select = document.getElementById('status-'+orderId);
    fetch('/api/admin/orders/'+orderId+'/status', {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ status: select.value })
    })
    .then(function(res){ return res.json(); })
    .then(function(){ loadOrders(); })
    .catch(function(err){ alert('Could not update status.'); });
}

function loadProducts(){
    fetch('/api/admin/products')
        .then(function(res){ return res.json(); })
        .then(function(data){ renderProducts(data.products || []); })
        .catch(function(){
            document.getElementById('productsTableWrap').innerHTML = '<p class="empty-note">Could not load products.</p>';
        });
}

function renderProducts(products){
    var wrap = document.getElementById('productsTableWrap');
    if(products.length === 0){
        wrap.innerHTML = '<p class="empty-note">No products.</p>';
        return;
    }
    var html = '<table><thead><tr><th>Product</th><th>Price (USD)</th><th>Stock</th><th></th></tr></thead><tbody>';

    products.forEach(function(p){
        html += '<tr>' +
            '<td>'+p.name+'<br><span class="mono" style="font-size:11px;color:var(--ink-soft);">'+p.id+'</span></td>' +
            '<td><input class="edit-input" type="number" step="0.01" min="0" id="price-'+p.id+'" value="'+p.price_usd+'"></td>' +
            '<td><input class="edit-input" type="number" step="1" min="0" id="stock-'+p.id+'" value="'+p.stock+'"></td>' +
            '<td><button class="save-btn" onclick="saveProduct(\''+p.id+'\')">Save</button></td>' +
        '</tr>';
    });

    html += '</tbody></table>';
    wrap.innerHTML = html;
}

function saveProduct(productId){
    var price = document.getElementById('price-'+productId).value;
    var stock = document.getElementById('stock-'+productId).value;

    fetch('/api/admin/products/'+productId, {
        method:'PUT',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ price_usd: price, stock: stock })
    })
    .then(function(res){ return res.json(); })
    .then(function(){ loadProducts(); })
    .catch(function(){ alert('Could not update product.'); });
}

checkSession();
</script>

</body>
</html>
